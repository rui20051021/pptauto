services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      PPT_UI_SECRET_KEY: ${PPT_UI_SECRET_KEY:-change-me-in-production}
      PPT_UI_DATABASE_URL: ${PPT_UI_DATABASE_URL:-sqlite:////app/var/ppt_master_ui.db}
      PPT_UI_STORAGE_BACKEND: ${PPT_UI_STORAGE_BACKEND:-local}
      PPT_UI_MODEL_PROVIDER: ${PPT_UI_MODEL_PROVIDER:-mock}
      PPT_UI_MODEL_NAME: ${PPT_UI_MODEL_NAME:-gpt-4.1-mini}
      PPT_UI_MODEL_API_KEY: ${PPT_UI_MODEL_API_KEY:-}
      PPT_UI_MODEL_BASE_URL: ${PPT_UI_MODEL_BASE_URL:-}
      PPT_UI_MODEL_RUNTIME_CONFIG_PATH: ${PPT_UI_MODEL_RUNTIME_CONFIG_PATH:-/app/var/model_runtime_config.json}
      PPT_UI_JOB_INLINE: ${PPT_UI_JOB_INLINE:-false}
    volumes:
      - ppt-master-var:/app/var
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz').read()"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${PPT_MASTER_PORT:-8080}:80"
    restart: unless-stopped

volumes:
  ppt-master-var:
