    <main id="mainContent" class="viewer-shell">
        <section id="libraryView">

        </section>

        <section id="viewerView" class="hidden">
            <div class="viewer-hero slide-enter">

                <p class="viewer-overline">Project Viewer</p>

                <p id="viewerDescription" class="viewer-description">项目描述</p>
            </div>

            <div id="slideViewerContainer" class="viewer-layout slide-enter">
                <div class="main-slide-area">
                    <div class="slide-stage">
                        <div class="slide-frame">
                            <object id="mainSlide" data="" type="image/svg+xml" class="fade-in" onclick="toggleFullscreen()">
                                <p class="card-preview-placeholder">SVG 加载中...</p>
                            </object>
                        </div>
                    </div>

                    <div class="controls-row">
                        <button type="button" id="prevBtn" class="nav-btn" onclick="prevSlide()" aria-label="上一页">
                            <i class="fas fa-chevron-left" aria-hidden="true"></i>
                        </button>
                        <div class="page-indicator">
                            <strong id="currentPage">1</strong>
                            <span>/</span>
                            <span id="totalPages">1</span>
                        </div>
                        <button type="button" id="nextBtn" class="nav-btn" onclick="nextSlide()" aria-label="下一页">
                            <i class="fas fa-chevron-right" aria-hidden="true"></i>
                        </button>
                        <button type="button" class="nav-btn" onclick="toggleFullscreen()" aria-label="全屏查看">
                            <i class="fas fa-expand" aria-hidden="true"></i>
                        </button>
                    </div>
                </div>

                <aside class="sidebar-panel">
                    <div class="panel">
                        <h3 class="panel-title">页面目录</h3>
                        <div id="thumbnailContainer"></div>
                    </div>
                    <div class="panel">

                        <p id="slideTitle" class="slide-meta-title">标题</p>
                        <p id="slideDesc" class="slide-meta-desc">描述</p>

                </aside>

            <section class="overview-section slide-enter">

        let collections = collectionsData;
        let currentCollection = null;
        let currentSlide = 0;
        let isFullscreen = false;
        let dropdownOpen = false;
        let viewMode = 'normal';

        function encodeCollection(collection) {
            return JSON.stringify(collection).replace(/'/g, '&#39;');
        }

        function renderCollections() {
            const grid = document.getElementById('collectionsGrid');

            if (collections.length === 0) {
                document.getElementById('emptyState').classList.remove('hidden');
                grid.innerHTML = '';
                return;
            }

            document.getElementById('emptyState').classList.add('hidden');
            grid.innerHTML = collections.map(collection => {
                const coverPath = encodeURI(`examples/${collection.folder}/${collection.slides[0].file}`);
                return `
                    <button type="button" class="collection-card" onclick='openCollection(${encodeCollection(collection)})'>
                        <div class="collection-card__media">
                            <object data="${coverPath}" type="image/svg+xml" class="collection-card__preview" style="pointer-events:none">
                                <div class="card-preview-placeholder">SVG</div>
                            </object>
                            <span class="collection-card__count">${collection.slides.length} 页</span>
                        </div>
                        <div class="collection-card__content">
                            <p class="collection-card__eyebrow">PPT Master 案例</p>
                            <h3 class="collection-card__title">${collection.title}</h3>
                            <p class="collection-card__desc">${collection.description}</p>
                            <span class="collection-card__cta">进入查看器</span>
                        </div>
                    </button>
                `;
            }).join('');

            renderDropdown();
        }

        function renderDropdown() {
            const dropdown = document.getElementById('dropdownMenu');
            dropdown.innerHTML = collections.map(collection => `
                <button type="button" class="collection-option ${currentCollection?.id === collection.id ? 'is-active' : ''}"
                    onclick='switchCollection(${encodeCollection(collection)})'>
                    <div>
                        <p class="collection-option__title">${collection.title}</p>
                        <p class="collection-option__meta">${collection.description}</p>
                    </div>
                    <span class="collection-option__count">${collection.slides.length} 页</span>
                </button>
            `).join('');
        }

        function toggleDropdown() {
            dropdownOpen = !dropdownOpen;
            document.getElementById('dropdownMenu').classList.toggle('hidden', !dropdownOpen);
            document.querySelector('.collection-selector__button')?.setAttribute('aria-expanded', dropdownOpen ? 'true' : 'false');
        }

        document.addEventListener('click', event => {
            if (!event.target.closest('#collectionSelector')) {
                dropdownOpen = false;
                document.getElementById('dropdownMenu').classList.add('hidden');
                document.querySelector('.collection-selector__button')?.setAttribute('aria-expanded', 'false');
            }
        });

        function openCollection(collection) {
            currentCollection = collection;
            currentSlide = 0;

            const url = new URL(window.location);
            url.searchParams.set('project', collection.id);
            window.history.pushState({}, '', url);

            document.getElementById('libraryView').classList.add('hidden');
            document.getElementById('viewerView').classList.remove('hidden');
            document.getElementById('collectionSelector').classList.remove('hidden');
            document.getElementById('keyboardHints').classList.remove('hidden');
            document.getElementById('keyboardHints').classList.add('flex');
            document.getElementById('mainContent').classList.add('viewer-expanded');

            document.getElementById('currentCollectionIcon').textContent = collection.icon || '•';
            document.getElementById('currentCollectionName').textContent = collection.title;
            document.getElementById('viewerTitle').textContent = collection.title;
            document.getElementById('viewerDescription').textContent = collection.description;
            document.getElementById('totalPages').textContent = collection.slides.length;
            document.getElementById('fullscreenTotal').textContent = collection.slides.length;
            document.title = `${collection.title} · PPT Master Viewer`;

            dropdownOpen = false;
            document.getElementById('dropdownMenu').classList.add('hidden');
            document.getElementById('progressBar').style.width = '0%';

            setViewMode('normal');
            generateThumbnails();
            generateOverview();
            updateSlide();
            renderDropdown();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function switchCollection(collection) {
            dropdownOpen = false;
            document.getElementById('dropdownMenu').classList.add('hidden');
            openCollection(collection);
        }

        function backToLibrary() {
            currentCollection = null;

            const url = new URL(window.location);
            url.searchParams.delete('project');
            window.history.pushState({}, '', url);

            if (isFullscreen) {
                isFullscreen = false;
                document.getElementById('fullscreenOverlay').classList.add('hidden');
                document.body.style.overflow = '';
            }

            document.getElementById('libraryView').classList.remove('hidden');
            document.getElementById('viewerView').classList.add('hidden');
            document.getElementById('collectionSelector').classList.add('hidden');
            document.getElementById('keyboardHints').classList.add('hidden');
            document.getElementById('keyboardHints').classList.remove('flex');
            document.getElementById('progressBar').style.width = '0%';
            document.getElementById('mainContent').classList.remove('viewer-expanded');
            document.getElementById('slideViewerContainer').classList.remove('theater-mode');
            document.title = 'PPT Master Viewer';

            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function setViewMode(mode) {
            viewMode = mode;
            const container = document.getElementById('slideViewerContainer');
            const normalBtn = document.getElementById('normalModeBtn');
            const theaterBtn = document.getElementById('theaterModeBtn');

            if (mode === 'theater') {
                container.classList.add('theater-mode');
                normalBtn.classList.remove('active');
                theaterBtn.classList.add('active');
            } else {
                container.classList.remove('theater-mode');
                normalBtn.classList.add('active');
                theaterBtn.classList.remove('active');
            }
        }

        function toggleViewMode() {
            setViewMode(viewMode === 'normal' ? 'theater' : 'normal');
        }

        function generateThumbnails() {
            if (!currentCollection) return;

            const container = document.getElementById('thumbnailContainer');
            const basePath = `examples/${currentCollection.folder}/`;

            container.innerHTML = currentCollection.slides.map((slide, index) => {
                const slidePath = encodeURI(basePath + slide.file);
                return `
                    <button type="button" class="thumbnail ${index === 0 ? 'is-active' : ''}" onclick="goToSlide(${index})" id="thumb-${index}">
                        <div class="thumbnail__media">
                            <object data="${slidePath}" type="image/svg+xml" style="pointer-events:none">
                                <div class="card-preview-placeholder">SVG</div>
                            </object>
                        </div>
                        <div class="thumbnail__caption">${index + 1}. ${slide.title}</div>
                    </button>
                `;
            }).join('');
        }

        function generateOverview() {
            if (!currentCollection) return;

            const container = document.getElementById('overviewGrid');
            const basePath = `examples/${currentCollection.folder}/`;

            container.innerHTML = currentCollection.slides.map((slide, index) => {
                const slidePath = encodeURI(basePath + slide.file);
                return `
                    <button type="button" class="overview-card" onclick="goToSlide(${index}); window.scrollTo({ top: 0, behavior: 'smooth' })">
                        <div class="overview-card__media">
                            <object data="${slidePath}" type="image/svg+xml" style="pointer-events:none">
                                <div class="card-preview-placeholder">SVG</div>
                            </object>
                        </div>
                        <div class="overview-card__body">
                            <p class="overview-card__title">${index + 1}. ${slide.title}</p>
                            <p class="overview-card__desc">${slide.desc}</p>
                        </div>
                    </button>
                `;
            }).join('');
        }

        function updateSlide() {
            if (!currentCollection) return;

            const slide = currentCollection.slides[currentSlide];
            const basePath = `examples/${currentCollection.folder}/`;
            const slidePath = encodeURI(basePath + slide.file);

            const mainSlide = document.getElementById('mainSlide');
            const fullscreenImage = document.getElementById('fullscreenImage');

            mainSlide.classList.remove('fade-in');
            void mainSlide.offsetWidth;
            mainSlide.classList.add('fade-in');
            mainSlide.data = slidePath;
            fullscreenImage.data = slidePath;

            document.getElementById('currentPage').textContent = currentSlide + 1;
            document.getElementById('fullscreenPage').textContent = currentSlide + 1;
            document.getElementById('slideTitle').textContent = slide.title;
            document.getElementById('slideDesc').textContent = slide.desc;

            const progress = ((currentSlide + 1) / currentCollection.slides.length) * 100;
            document.getElementById('progressBar').style.width = `${progress}%`;

            document.getElementById('prevBtn').disabled = currentSlide === 0;
            document.getElementById('nextBtn').disabled = currentSlide === currentCollection.slides.length - 1;

            currentCollection.slides.forEach((_, index) => {
                const thumb = document.getElementById(`thumb-${index}`);
                if (!thumb) return;

                if (index === currentSlide) {
                    thumb.classList.add('is-active');
                    thumb.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                } else {
                    thumb.classList.remove('is-active');
                }
            });
        }

        function nextSlide() {
            if (currentCollection && currentSlide < currentCollection.slides.length - 1) {
                currentSlide += 1;
                updateSlide();
            }
        }

        function prevSlide() {
            if (currentCollection && currentSlide > 0) {
                currentSlide -= 1;
                updateSlide();
            }
        }

        function goToSlide(index) {
            currentSlide = index;
            updateSlide();
        }

        function toggleFullscreen() {
            if (!currentCollection) return;

            const overlay = document.getElementById('fullscreenOverlay');
            isFullscreen = !isFullscreen;

            if (isFullscreen) {
                overlay.classList.remove('hidden');
                document.body.style.overflow = 'hidden';
            } else {
                overlay.classList.add('hidden');
                document.body.style.overflow = '';
            }
        }

        document.addEventListener('keydown', event => {
            if (!currentCollection && event.key !== 'Escape') return;

            switch (event.key) {
                case 'ArrowLeft':
                    prevSlide();
                    break;
                case 'ArrowRight':
                    nextSlide();
                    break;
                case 'Escape':
                    if (isFullscreen) {
                        toggleFullscreen();
                    } else if (currentCollection) {
                        backToLibrary();
                    }
                    break;
                case 'f':
                case 'F':
                    if (currentCollection) toggleFullscreen();
                    break;
                case 't':
                case 'T':
                    if (currentCollection && !isFullscreen) toggleViewMode();
                    break;
            }
        });

        window.addEventListener('popstate', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const collectionId = urlParams.get('project');

            if (collectionId) {
                const collection = collections.find(item => item.id === collectionId);
                if (collection) {
                    openCollection(collection);
                }
            } else {
                backToLibrary();
            }
        });

        let touchStartX = 0;
        let touchEndX = 0;

        document.addEventListener('touchstart', event => {
            touchStartX = event.changedTouches[0].screenX;
        });

        document.addEventListener('touchend', event => {
            touchEndX = event.changedTouches[0].screenX;
            const diff = touchStartX - touchEndX;

            if (Math.abs(diff) > 50 && currentCollection) {
                if (diff > 0) nextSlide();
                else prevSlide();
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            renderCollections();

            const urlParams = new URLSearchParams(window.location.search);
            const collectionId = urlParams.get('project');
            if (collectionId) {
                const collection = collections.find(item => item.id === collectionId);
                if (collection) {
                    openCollection(collection);
                }
            }
        });
    </script>
</body>

</html>
